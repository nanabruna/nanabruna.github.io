<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro - Aurora PetCare</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="js/script.js"></script>
</head>

<body>

<header>
<h1>Aurora PetCare</h1>
</header>

<div class="container container-custom">

<h2>Cadastro do Cliente e Pet</h2>

<form onsubmit="confirmarCadastro(); return false;">

<label>Nome:</label>
<input type="text" class="form-control" required>

<label>CPF:</label>
<input type="text" class="form-control" required>

<label>E-mail:</label>
<input type="email" class="form-control" required>

<label>Nome do Pet:</label>
<input type="text" class="form-control" required>

<label>Raça:</label>
<input type="text" class="form-control">

<label>Idade:</label>
<input type="number" class="form-control">

<label>Serviço:</label>
<select class="form-control">
<option>Banho</option>
<option>Banho + Tosa</option>
</select>

<label>TeleBusca:</label>
<select class="form-control">
<option>Sim</option>
<option>Não</option>
</select>

<label>Data:</label>
<input type="date" class="form-control" required>

<label>Hora:</label>
<input type="time" class="form-control" required>

<br>
<input type="submit" value="Cadastrar" class="btn btn-custom">

</form>

</div>

<footer>
<p>© 2025 Aurora PetCare</p>
</footer>

</body>
</html>
